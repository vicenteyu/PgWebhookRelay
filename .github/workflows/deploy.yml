name: Build, Release and Push Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/pg-webhook-relay
  PROJECT_PATH: src/PgWebhookRelay.csproj

jobs:
  # ==========================================
  # 任务一：跨平台本地单文件编译发布
  # ==========================================
  build-binaries:
    name: Build Native AOT Binaries
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            output_name: pg-webhook-relay-linux
            exe_name: PgWebhookRelay
          - os: windows-latest
            rid: win-x64
            output_name: pg-webhook-relay-win.exe
            exe_name: PgWebhookRelay.exe
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install Linux Build Tools
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y clang zlib1g-dev

    - name: Dotnet Publish (Native AOT)
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} -c Release -r ${{ matrix.rid }} -o ./publish /p:PublishAot=true

    - name: Upload Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output_name }}
        path: ./publish/${{ matrix.exe_name }}

  # ==========================================
  # 任务二：构建 Docker 镜像并推送
  # ==========================================
  build-docker:
    name: Build and Push Docker Image
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Linux Artifact for Docker
      uses: actions/download-artifact@v4
      with:
        name: pg-webhook-relay-linux
        path: ./publish

    - name: Rename artifact for Docker
      run: mv ./publish/PgWebhookRelay ./publish/pg-webhook-relay-linux

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ==========================================
  # 任务三：自动创建 GitHub Release
  # ==========================================
  create-release:
    name: Create GitHub Release
    needs: [build-binaries, build-docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
    - name: Download Linux Artifact
      uses: actions/download-artifact@v4
      with:
        name: pg-webhook-relay-linux
        path: ./release

    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: pg-webhook-relay-win.exe
        path: ./release

    - name: Rename Files
      run: |
        mv ./release/PgWebhookRelay ./release/pg-webhook-relay-linux
        mv ./release/PgWebhookRelay.exe ./release/pg-webhook-relay-win.exe

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./release/pg-webhook-relay-linux
          ./release/pg-webhook-relay-win.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}